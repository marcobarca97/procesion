<!DOCTYPE html>
<html>
<head>
  <title>Tracker Manual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .titulo {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #0d1b2a;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div class="titulo">Toca el mapa para enviar ubicación 📍</div>
<div id="map"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBqCCRgl-T4iVxOkFr54t-V5TsLEtUePUw",
  authDomain: "procesion2026.firebaseapp.com",
  databaseURL: "https://procesion2026-default-rtdb.firebaseio.com",
  projectId: "procesion2026",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Crear mapa
const map = L.map('map').setView([14.6349, -90.5069], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// Marcador
let marker;

// Click en mapa
map.on('click', function(e) {
  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  // Mover marcador
  if (marker) {
    marker.setLatLng([lat, lng]);
  } else {
    marker = L.marker([lat, lng]).addTo(map);
  }

  // Enviar a Firebase
  db.ref("ubicacion").set({
    lat: lat,
    lng: lng
  });

  alert("Ubicación enviada 📍");
});
</script>

</body>
</html>
