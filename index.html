<!DOCTYPE html>
<html>
<head>
  <title>Procesión en Vivo</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  const firebaseConfig = {
    apiKey: "AQUI_TU_API_KEY",
    authDomain: "AQUI_TU_AUTH",
    databaseURL: "AQUI_TU_DATABASE_URL",
    projectId: "AQUI_TU_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const map = L.map('map').setView([14.6349, -90.5069], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let marker = L.marker([14.6349, -90.5069]).addTo(map);

  db.ref("ubicacion").on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      marker.setLatLng([data.lat, data.lng]);
      map.panTo([data.lat, data.lng]);
    }
  });
</script>

</body>
</html>
