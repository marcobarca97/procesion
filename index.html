<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Procesión en Vivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>

      body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
  }
  
  #map {
    height: 100vh;
  }
  
  /* 🔴 EN VIVO */
  .live {
    position: absolute;
    top: 15px;
    right: 15px;
    background: linear-gradient(45deg, #b30000, #ff0000);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    z-index: 1000;
  }
  
  /* 🎯 BOTÓN */
  .btn {
    position: absolute;
    right: 15px;
    bottom: 100px;
    background: #ffd700;
    color: #0d1b2a;
    padding: 14px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1000;
  }
  
  /* 🧾 PANEL */
  .panel {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: #0d1b2a;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    box-shadow: 0 -3px 10px rgba(0,0,0,0.4);
    z-index: 1000;
  }
  
  .logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
    border-radius: 10px;
    background: white;
    padding: 5px;
  }
  
  .info h3 {
    margin: 0;
    font-size: 16px;
    color: #ffd700;
  }
  
  .info p {
    margin: 2px 0 0;
    font-size: 13px;
    color: #ccc;
  }
      
  
    </style>
  </head>
  <body>
  
  <div id="map"></div>
  
  <div class="live">EN VIVO</div>
  
  <div class="btn" onclick="centrar()">📍</div>
  
  <div class="panel">
    <img src="logo.png" class="logo">
  
    <div class="info">
      <h3>SOLEMNE PROCESIÓN DE REPARACIÓN A LA SANTÍSIMA TRINIDAD</h3>
      <h2>Asociación de Festejos Guadalupanos, Sector "El Bosque" El Gallito z.3</h2>
      <p>VIERNES 22 DE MAYO DEL 2026</p>
    </div>
  </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBqCCRgl-T4iVxOkFr54t-V5TsLEtUePUw",
  authDomain: "procesion2026.firebaseapp.com",
  databaseURL: "https://procesion2026-default-rtdb.firebaseio.com",
  projectId: "procesion2026",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map').setView([14.6349, -90.5069], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* 🖼️ ICONO PERSONALIZADO */
const icono = L.icon({
  iconUrl: 'icono.png', // 👈 CAMBIA POR TU IMAGEN
  iconSize: [45, 45],
});

let marker = L.marker([14.6349, -90.5069], { icon: icono }).addTo(map);

let ultimaPosicion = [14.6349, -90.5069];

db.ref("ubicacion").on("value", (snapshot) => {
  const data = snapshot.val();
  if (data) {
    ultimaPosicion = [data.lat, data.lng];
    marker.setLatLng(ultimaPosicion);
    map.panTo(ultimaPosicion);
  }
});

function centrar() {
  map.setView(ultimaPosicion, 16);
}
</script>

</body>
</html>
