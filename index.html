    margin: 0;

  #map {
    height: 100vh;
  }
  
  .live {
    position: absolute;
    top: 15px;
    left: 50px;
    background: linear-gradient(45deg, #b30000, #ff0000);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    z-index: 1000;
  }
  
  .btn {
    position: absolute;
    right: 15px;
    bottom: 140px;
    background: #ffd700;
    color: #0d1b2a;
    padding: 14px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1000;
  }
  
  .panel {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: #0d1b2a;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    box-shadow: 0 -3px 10px rgba(0,0,0,0.4);
    z-index: 1000;
    justify-content: center;
    text-align: center;
  }
  
  .logo-top {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 85px;
    height: 85px;
    object-fit: contain;
    z-index: 1000;
    
  }
  
  .info h3 {
    margin: 0;
    font-size: 16px;
    color: #ffd700;
  }
  
  .info p {
    margin: 2px 0 0;
    font-size: 13px;
    color: #ccc;
  }

  .panel {
    max-height: 90px;      /* 👈 vuelve a limitar */
    overflow: hidden;      /* 👈 evita que se desborde */
    padding: 8px;

  .info {
    width: 100%;
  }

  .info h3 {
    font-size: 12px;
    line-height: 1.1;
  }

  .info h2 {
    font-size: 10px;
    line-height: 1.1;
  }

  .info p {
    font-size: 10px;
  }

}

const icono = L.icon({
  iconUrl: 'icono.png', // 👈 CAMBIA POR TU IMAGEN
  iconSize: [45, 45],
});

let marker = L.marker([14.6349, -90.5069], { icon: icono }).addTo(map);

let ultimaPosicion = [14.6349, -90.5069];

db.ref("ubicacion").on("value", (snapshot) => {
  const data = snapshot.val();
  if (data) {
    ultimaPosicion = [data.lat, data.lng];
    marker.setLatLng(ultimaPosicion);
    map.panTo(ultimaPosicion);
  }
});

function centrar() {
  map.setView(ultimaPosicion, 16);
}
