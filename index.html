<!DOCTYPE html>
<html>
<head>
  <title>Procesión en Vivo</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase versión compatible -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBqCCRgl-T4iVxOkFr54t-V5TsLEtUePUw",
    authDomain: "procesion2026.firebaseapp.com",
    databaseURL: "https://procesion2026-default-rtdb.firebaseio.com",
    projectId: "procesion2026",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const map = L.map('map').setView([14.6349, -90.5069], 13);

  const iconoProcesion = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/3176/3176292.png',
  iconSize: [40, 40],
});

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let marker = L.marker([14.6349, -90.5069], { icon: iconoProcesion }).addTo(map);

  db.ref("ubicacion").on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      marker.setLatLng([data.lat, data.lng]);
      map.panTo([data.lat, data.lng]);
    }
  });
</script>

</body>
</html>
